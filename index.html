<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist-font@latest/style.css">

  <!-- daisyUI + Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <title>Job Application Tracker</title>

  <style>
    body { font-family: Geist, ui-sans-serif, system-ui; }
  </style>
</head>
<body class="bg-base-200">

  <main class="max-w-5xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6">Job Application Tracker</h1>

    <!-- Dashboard -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <div class="card bg-base-100 shadow">
        <div class="card-body">
          <h2 class="text-sm text-black/70">Total</h2>
          <p id="totalCount" class="text-2xl font-bold text-black">0</p>
        </div>
      </div>
      <div class="card bg-base-100 shadow">
        <div class="card-body">
          <h2 class="text-sm text-black/70">Interview</h2>
          <p id="interviewCount" class="text-2xl font-bold text-green-600">0</p>
        </div>
      </div>
      <div class="card bg-base-100 shadow">
        <div class="card-body">
          <h2 class="text-sm text-black/70">Rejected</h2>
          <p id="rejectedCount" class="text-2xl font-bold text-red-600">0</p>
        </div>
      </div>
    </section>
